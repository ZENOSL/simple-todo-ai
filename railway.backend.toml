# 后端服务 Railway 配置
# Docs: https://docs.railway.app/reference/config-as-code
#
# 使用方式（一次性 Dashboard 操作，永久生效）：
#   Railway Dashboard → 后端服务 → Settings → Config File Path
#   将值改为：railway.backend.toml
#   保存后 Railway 将始终读取此文件，不再受 railway.toml 影响。
#
# 此后所有部署均以此文件为准，无需再手动修改 Dashboard 配置。
# ==============================================================

[build]
dockerfilePath = "Dockerfile.backend"

[deploy]
# 显式声明 startCommand，防止 Railway 回退到 railway.toml 中的 "node server.js"
# 必须包含 prisma migrate deploy，否则数据库迁移不会执行
startCommand = "npx prisma migrate deploy && node dist/server.js"
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
