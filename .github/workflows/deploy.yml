# CI/CD pipeline for Simple Todo AI
#
# Flow: lint → type-check → build → deploy (Railway)
#
# Required GitHub Secrets:
#   RAILWAY_TOKEN          — Railway API token (Settings → Tokens)
#   RAILWAY_SERVICE_FRONTEND — Railway service ID for the frontend
#   RAILWAY_SERVICE_BACKEND  — Railway service ID for the backend
#   DATABASE_URL           — Passed to prisma migrate deploy in CI

name: Deploy to Railway

on:
  push:
    branches:
      - main
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Cancel any in-progress run for the same branch when a new push arrives
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Job 1 — Lint
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # --------------------------------------------------------------------------
  # Job 2 — Type check (frontend + backend)
  # --------------------------------------------------------------------------
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client (needed for type resolution)
        run: npx prisma generate

      - name: Type check — frontend (Next.js)
        run: npx tsc --noEmit

      - name: Type check — backend
        run: npx tsc --project tsconfig.backend.json --noEmit

  # --------------------------------------------------------------------------
  # Job 3 — Build verification
  # Ensures both frontend and backend compile successfully before deploy
  # --------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build backend (TypeScript → dist/)
        run: npm run build:backend

      - name: Build frontend (Next.js standalone)
        run: npm run build
        env:
          # Suppress telemetry in CI
          NEXT_TELEMETRY_DISABLED: "1"

  # --------------------------------------------------------------------------
  # Job 4 — Deploy to Railway
  # Runs only after all checks pass; triggers Railway to rebuild from
  # the new commit using each service's Dockerfile.
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend to Railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_FRONTEND }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy backend to Railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_BACKEND }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
