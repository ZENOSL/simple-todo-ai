# CI/CD pipeline for Simple Todo AI
#
# Flow: lint → type-check → build → deploy (Railway)
#
# Required GitHub Secrets:
#   RAILWAY_TOKEN              — Railway API token (Settings → Tokens)
#   RAILWAY_SERVICE_FRONTEND   — Railway service ID for the frontend
#   RAILWAY_SERVICE_BACKEND    — Railway service ID for the backend
#   DATABASE_URL               — Passed to prisma migrate deploy in CI

name: Deploy to Railway

on:
  push:
    branches:
      - main
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Cancel any in-progress run for the same branch when a new push arrives
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Job 1 — Lint (frontend only)
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  # --------------------------------------------------------------------------
  # Job 2 — Type check (frontend + backend, parallel)
  # --------------------------------------------------------------------------
  type-check-frontend:
    name: Type Check (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check — frontend (Next.js)
        working-directory: frontend
        run: npx tsc --noEmit

  type-check-backend:
    name: Type Check (Backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Type check — backend
        working-directory: backend
        run: npx tsc --noEmit

  # --------------------------------------------------------------------------
  # Job 3 — Build verification (parallel)
  # --------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check-frontend, type-check-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & build backend
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Install & build frontend
        working-directory: frontend
        run: npm ci && npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: "http://localhost:3001"

  # --------------------------------------------------------------------------
  # Job 4 — Deploy to Railway
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run database migrations
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend to Railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_FRONTEND }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy backend to Railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_BACKEND }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
