# Railway configuration — single-service deployment (Hobby plan)
# Docs: https://docs.railway.app/reference/config-as-code
#
# NOTE: Railway Hobby plan supports only ONE service per deployment config.
# Multi-service [[services]] format is a Pro plan feature.
# Frontend is deployed via this config; backend is deployed as a separate
# Railway project/service with its own environment variables.

[deploy]
startCommand = "node .next/standalone/server.js"
# Railway pings this path during rolling deploys; 300s allows for cold starts
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
