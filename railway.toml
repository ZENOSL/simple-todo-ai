# Railway monorepo configuration
# Docs: https://docs.railway.app/reference/config-as-code

# ---------------------------------------------------------------------------
# Frontend service — Next.js standalone server
# ---------------------------------------------------------------------------
[services.frontend]
dockerfile = "Dockerfile.frontend"

[services.frontend.deploy]
startCommand = "node server.js"
# Railway pings this path during rolling deploys; 300s allows for cold starts
healthcheckPath = "/"
healthcheckTimeout = 300

# ---------------------------------------------------------------------------
# Backend service — Fastify + Prisma
# ---------------------------------------------------------------------------
[services.backend]
dockerfile = "Dockerfile.backend"

[services.backend.deploy]
# CMD in Dockerfile handles migrate deploy; this is the final process
startCommand = "node dist/server.js"
# /health is the lightweight liveness endpoint (no DB/Redis dependency)
healthcheckPath = "/health"
healthcheckTimeout = 300
